<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OTTO 123 - 开源机器人创客教育</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="OTTO 123 - 让每个孩子都能创造自己的机器人">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="/_media/favicon.ico">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-secondary: #35495e;
    }
    .sidebar {
      background-color: #f8f9fa;
    }
    .sidebar ul li a {
      font-size: 14px;
    }
    .sidebar ul li.active>a {
      color: var(--theme-color);
      font-weight: bold;
    }
    .markdown-section h1 {
      font-size: 2rem;
      color: var(--theme-color-secondary);
    }
    .markdown-section h2 {
      font-size: 1.5rem;
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.3rem;
    }
    .markdown-section h3 {
      font-size: 1.25rem;
    }
    .markdown-section code {
      background-color: #f6f8fa;
      border-radius: 3px;
    }
    .markdown-section pre {
      background-color: #f6f8fa;
      border-radius: 6px;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background-color: #f8f9fa;
      padding: 10px 15px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section th {
      background-color: var(--theme-color);
      color: white;
    }
    .markdown-section tr:nth-child(2n) {
      background-color: #f8f9fa;
    }
    .app-name-link img {
      max-width: 100px;
    }
    .github-corner svg {
      fill: var(--theme-color);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'OTTO 123',
      repo: 'flybear16/otto123',
      logo: '/_media/logo.png',
      coverpage: true,
      onlyCover: false,
      loadSidebar: true,
      loadNavbar: true,
      mergeNavbar: true,
      maxLevel: 4,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '未找到结果',
        depth: 6,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function (html) {
            if (/githubusercontent\.com/.test(vm.route.file)) {
              url = vm.route.file
                .replace('raw.githubusercontent.com', 'github.com')
                .replace(/\/master/, '/blob/master')
            } else {
              url = 'https://github.com/flybear16/otto123/blob/main/docs/' + vm.route.file
            }
            var editHtml = '[:memo: 编辑文档](' + url + ')\n'
            return editHtml + html
          })
        }
      ]
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Copy Code -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Pagination -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- Emoji -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <!-- External Script -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
  <!-- Image Zoom -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
