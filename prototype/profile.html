<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otto Robot - 个人中心</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar" style="background:transparent;color:#fff;position:relative;z-index:10;">
            <span class="status-time" style="color:#fff;">9:41</span>
            <div class="status-icons" style="color:#fff;">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- Content -->
        <div class="phone-content">
            <!-- Profile Header -->
            <div class="profile-header" style="padding-top:0;">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop&crop=face" class="profile-avatar">
                <div class="profile-name">小明同学</div>
                <div class="profile-meta">
                    <i class="fas fa-graduation-cap" style="margin-right:4px;"></i>七年级 3 班 · 实验中学
                </div>
                <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;">
                    <span class="badge" style="background:rgba(255,255,255,0.2);color:#fff;">
                        <i class="fas fa-star" style="margin-right:3px;"></i>Lv.5 编程达人
                    </span>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stat-grid" style="margin-top:-20px;position:relative;z-index:5;">
                <div class="stat-card" style="box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                    <div class="stat-value" style="color:#6366f1;">12</div>
                    <div class="stat-label">作品数</div>
                </div>
                <div class="stat-card" style="box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                    <div class="stat-value" style="color:#f59e0b;">5</div>
                    <div class="stat-label">参赛次数</div>
                </div>
                <div class="stat-card" style="box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                    <div class="stat-value" style="color:#10b981;">28h</div>
                    <div class="stat-label">编程时长</div>
                </div>
            </div>

            <!-- Parent Binding -->
            <div class="card" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:36px;height:36px;border-radius:10px;background:#10b981;color:#fff;display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div>
                            <div style="font-size:14px;font-weight:600;color:#1e293b;">家长绑定</div>
                            <div style="font-size:11px;color:#16a34a;">已绑定 · 爸爸</div>
                        </div>
                    </div>
                    <i class="fas fa-check-circle" style="color:#10b981;font-size:20px;"></i>
                </div>
            </div>

            <!-- Menu Groups -->
            <div class="settings-group">
                <div class="settings-item">
                    <div class="settings-icon" style="background:#fef3c7;color:#f59e0b;">
                        <i class="fas fa-star"></i>
                    </div>
                    <span class="settings-label">我的收藏</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span style="font-size:13px;color:#94a3b8;">8</span>
                        <i class="fas fa-chevron-right list-arrow"></i>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-icon" style="background:#e0e7ff;color:#6366f1;">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <span class="settings-label">课堂记录</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span style="font-size:13px;color:#94a3b8;">24 节</span>
                        <i class="fas fa-chevron-right list-arrow"></i>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-icon" style="background:#fee2e2;color:#ef4444;">
                        <i class="fas fa-bell"></i>
                    </div>
                    <span class="settings-label">消息通知</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span style="width:8px;height:8px;border-radius:50%;background:#ef4444;"></span>
                        <i class="fas fa-chevron-right list-arrow"></i>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-item">
                    <div class="settings-icon" style="background:#f3e8ff;color:#8b5cf6;">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="settings-label">我的机器人</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span style="font-size:13px;color:#94a3b8;">1 台</span>
                        <i class="fas fa-chevron-right list-arrow"></i>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-icon" style="background:#dcfce7;color:#10b981;">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <span class="settings-label">我的订单</span>
                    <i class="fas fa-chevron-right list-arrow"></i>
                </div>
                <div class="settings-item">
                    <div class="settings-icon" style="background:#e0f2fe;color:#0ea5e9;">
                        <i class="fas fa-download"></i>
                    </div>
                    <span class="settings-label">模块管理</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span style="font-size:13px;color:#94a3b8;">3 个已激活</span>
                        <i class="fas fa-chevron-right list-arrow"></i>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-item">
                    <div class="settings-icon" style="background:#f1f5f9;color:#64748b;">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="settings-label">设置</span>
                    <i class="fas fa-chevron-right list-arrow"></i>
                </div>
                <div class="settings-item">
                    <div class="settings-icon" style="background:#f1f5f9;color:#64748b;">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <span class="settings-label">帮助与反馈</span>
                    <i class="fas fa-chevron-right list-arrow"></i>
                </div>
                <div class="settings-item">
                    <div class="settings-icon" style="background:#f1f5f9;color:#64748b;">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <span class="settings-label">关于 Otto Robot</span>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span style="font-size:13px;color:#94a3b8;">v1.0.0</span>
                        <i class="fas fa-chevron-right list-arrow"></i>
                    </div>
                </div>
            </div>

            <div style="height:20px;"></div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <a class="tab-item" href="home.html">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </a>
            <a class="tab-item" href="robot.html">
                <i class="fas fa-robot"></i>
                <span>机器人</span>
            </a>
            <a class="tab-item" href="chat.html">
                <i class="fas fa-comment-dots"></i>
                <span>对话</span>
            </a>
            <a class="tab-item" href="create.html">
                <i class="fas fa-puzzle-piece"></i>
                <span>创作</span>
            </a>
            <a class="tab-item active" href="profile.html">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </a>
        </div>
    </div>
</body>
</html>
